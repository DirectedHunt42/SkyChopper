<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyChopper Wind Dashboard</title>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">

<!-- Load dark/light CSS -->
<link id="theme-css" rel="stylesheet" href="assets/dark.css">
<script>
    const themeLink = document.getElementById('theme-css');
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        themeLink.href = 'assets/light.css';
    }
</script>
</head>

<body>
<div class="page">
    <header class="hero">
        <div class="eyebrow">Live telemetry</div>
        <div class="hero-row">
            <h1>SkyChopper Wind Dashboard</h1>
            <button class="settings-btn" id="open-settings" type="button">Settings</button>
        </div>
    </header>
    <div class="panel">
        <div class="status-row">
            <div class="status-item">
                <span class="status-dot" id="status-source"></span>
                <span class="status-label">Source</span>
            </div>
            <div class="status-item">
                <span class="status-dot" id="status-battery"></span>
                <span class="status-label">Battery</span>
            </div>
        </div>
        <div class="canvas-wrap">
            <div class="turbine" id="turbine" aria-hidden="true">
                <div class="turbine-hub"></div>
                <div class="blade blade-1"></div>
                <div class="blade blade-2"></div>
                <div class="blade blade-3"></div>
            </div>
            <canvas id="monitorCanvas" width="760" height="520"></canvas>
        </div>
    </div>

    <div class="modal-backdrop" id="settings-backdrop" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
            <div class="modal-header">
                <div>
                    <div class="modal-eyebrow">Configuration</div>
                    <h2 id="settings-title">Settings</h2>
                </div>
                <button class="icon-btn" id="close-settings" type="button" aria-label="Close settings">Close</button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label for="setting-source-min">Source Min Voltage</label>
                    <input id="setting-source-min" type="number" step="0.1">
                </div>
                <div class="field">
                    <label for="setting-source-max">Source Max Voltage</label>
                    <input id="setting-source-max" type="number" step="0.1">
                </div>
                <div class="field">
                    <label for="setting-batt-start">Battery Start Voltage</label>
                    <input id="setting-batt-start" type="number" step="0.1">
                </div>
                <div class="field">
                    <label for="setting-batt-stop">Battery Stop Voltage</label>
                    <input id="setting-batt-stop" type="number" step="0.1">
                </div>
                <div class="field">
                    <label for="setting-target-buck">Buck Target Voltage</label>
                    <input id="setting-target-buck" type="number" step="0.1">
                </div>
                <div class="field">
                    <label for="setting-batt-full">Battery Full Voltage</label>
                    <input id="setting-batt-full" type="number" step="0.1">
                </div>
                <div class="field">
                    <label for="setting-batt-empty">Battery Empty Voltage</label>
                    <input id="setting-batt-empty" type="number" step="0.1">
                </div>
                <div class="field">
                    <label for="setting-on-percent">On Percent</label>
                    <input id="setting-on-percent" type="number" step="1">
                </div>
                <div class="field">
                    <label for="setting-off-percent">Off Percent</label>
                    <input id="setting-off-percent" type="number" step="1">
                </div>
            </div>
            <div class="modal-actions">
                <button class="ghost-btn" id="download-settings" type="button">Download JSON</button>
                <button class="primary-btn" id="save-settings" type="button">Save</button>
            </div>
            <div class="modal-note">Save updates the UI instantly and stores settings locally. Download replaces `data/settings.json` for the simulator.</div>
        </div>
    </div>
</div>

<script src="scripts/write.js"></script>
</body>
</html>
