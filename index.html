<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyChopper Wind Dashboard</title>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">

<!-- Load dark/light CSS -->
<link id="theme-css" rel="stylesheet" href="assets/dark.css">
<script>
    const themeLink = document.getElementById('theme-css');
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        themeLink.href = 'assets/light.css';
    }
</script>
</head>

<body>
<div class="page">
    <header class="hero">
        <div class="eyebrow">Live telemetry</div>
        <h1>SkyChopper Wind Dashboard</h1>
    </header>
    <div class="panel">
        <div class="status-row">
            <div class="status-item">
                <span class="status-dot" id="status-source"></span>
                <span class="status-label">Source</span>
            </div>
            <div class="status-item">
                <span class="status-dot" id="status-battery"></span>
                <span class="status-label">Battery</span>
            </div>
        </div>
        <div class="canvas-wrap">
            <div class="turbine" id="turbine" aria-hidden="true">
                <div class="turbine-hub"></div>
                <div class="blade blade-1"></div>
                <div class="blade blade-2"></div>
                <div class="blade blade-3"></div>
            </div>
            <canvas id="monitorCanvas" width="760" height="520"></canvas>
        </div>
    </div>
</div>

<script src="scripts/write.js"></script>
</body>
</html>
